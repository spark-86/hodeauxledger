<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Sign Record - HodeauxLedger</title>
</head>

<body>
    <h1>Sign Record</h1>
    <label for="previous_hash">
        <input type="text" id="previous_hash" placeholder="Previous Hash" />
        <button id="hashButton">Hash</button>
    </label>
    <br />
    <label for="privateKey">Private Key
        <input type="text" id="privateKey" placeholder="Private Key" />
    </label>
    <br />
    <label for="jsonPayload">JSON Payload
        <textarea id="jsonPayload" placeholder='Paste record JSON here'></textarea><br />
    </label>
    <br />
    <button id="signButton">Sign</button>

    <pre id="output"></pre>

    <script type="module" src="index.js"></script>
</body>

</html>
