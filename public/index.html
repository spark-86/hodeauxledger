<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Submit Record - HodeauxLedger</title>
    <link rel="stylesheet" href="index.css" />
</head>

<body>
    <h1>HodeauxLedger - Sign Record</h1>
    <div id="recordForm">
        <label for="protocol">Protocol
            <select id="protocol">
                <option value="v1" selected>v1</option>
            </select>
        </label>
        <label for="scope">Scope
            <input type="text" id="scope" placeholder="Scope" />
        </label>
        <label for="record_type">Record Type
            <input type="text" id="record_type" placeholder="Record Type" />
        </label>
        <label for="jsonPayload">JSON Payload
            <textarea id="jsonPayload" placeholder='Paste record JSON here'></textarea>
        </label>
        <label for="privateKey">Private Key
            <input type="text" id="privateKey" placeholder="Private Key" />
        </label>
        <button id="signButton">Sign</button>

        <pre id="output"></pre>
        <pre id="network"></pre>
        <script type="module" src="index.js"></script>
    </div>
</body>

</html>
